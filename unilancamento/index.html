<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unilançamento - Descubra e Monitore Lançamentos</title>
    
    <!-- Tipografia Moderna (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        surface: '#0F172A',
                        highlight: '#DC2626',
                        borderStrong: 'rgb(185, 28, 28)'
                    }
                }
            }
        }
    </script>

    <!-- Biblioteca de Partículas -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow-x: hidden;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            overflow-y: hidden; 
        }

        input, select, textarea, a {
            user-select: auto;
            -webkit-user-select: auto;
            -moz-user-select: auto;
        }

        .glass-card {
            background: #0F172A; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 2px solid rgb(185, 28, 28); 
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            z-index: 2;
        }

        .info-field-wrapper {
            background: #ffffff;
            border-radius: 1.5rem; 
            border: 2px solid transparent;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .info-field-wrapper:focus-within {
            border-color: rgba(220, 38, 38, 0.5);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        @media (min-width: 768px) {
            .info-field-wrapper { border-radius: 9999px; }
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .video-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(220, 38, 38, 0.2);
            border-color: theme('colors.highlight');
        }

        .chip {
            animation: popIn 0.2s ease-out forwards;
        }
        .chip-op {
            animation: popIn 0.15s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .custom-alert {
            animation: slideDown 0.3s ease-out forwards;
        }
        @keyframes slideDown {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Esconder barra de rolagem e impedir estiramento no container de chips */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Esconder a setinha padrão do select e centralizar texto */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            text-align: center;
            text-align-last: center;
        }
        
        /* Efeito elegante de hover para nome do canal */
        .channel-hover-effect {
            max-width: 150px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
            position: relative;
        }
        .group\/channel:hover .channel-hover-effect {
            max-width: 400px;
            background-color: #0F172A;
            padding-right: 8px;
            z-index: 50;
            overflow: visible;
            box-shadow: 10px 0 15px -5px rgba(15, 23, 42, 0.9);
        }
    </style>
</head>

        // === LOCAL STORAGE (SALVAR/CARREGAR SESSÃO) ===
        function saveState() {

        function loadState() {

            if (saved) {

                    document.getElementById('langFilter').value = state.lang || '';

                    if(state.sort) {
                        document.getElementById('sortFilter').value = state.sort;
                        let sortName = 'Nº de Visualizações';
                        if(state.sort === 'comments') sortName = 'Nº de Comentários';
                        if(state.sort === 'subs') sortName = 'Nº de Inscritos';
                        document.getElementById('sortActiveText').textContent = sortName;

                    if(state.filtersOpen && !isFiltersOpen) {
                        document.getElementById('toggleFiltersBtn').click();

                        const container = document.getElementById(containerId);
                        const input = document.getElementById(containerId.replace('Container', 'Input'));
                        if(!container || !input || !tokens) return;
                        
                        clearChips(containerId);
                        tokens.forEach(t => {
                            if(t.type === 'word') {
                                createChipAndOp(t.value, container, input);
                            } else if (t.type === 'op') {
                                const ops = container.querySelectorAll('.chip-op');
                                if(ops.length > 0) {

                                    if(lastOp.getAttribute('data-op') !== t.value) {

                                    }
                                }
                            }
                        });
                    };

                    recreateChips('mainInputContainer', state.main);
                    recreateChips('descContainer', state.desc);
                    recreateChips('negativeContainer', state.neg);
                    recreateChips('channelContainer', state.channel);

        // === MÁQUINA DE ESCREVER ===
        function setupTypewriter(inputId, prefix, texts, isChipContainer = false) {
            let ptIndex = 0; let charIndex = 0; let isDeleting = false; let animationTimeout;
            const inputEl = document.getElementById(inputId);
            if (!inputEl) return;
            function shouldHidePlaceholder() {
                if (inputEl.value.length > 0) return true;
                if (isChipContainer) {
                    const container = inputEl.parentElement;
                    if (container.querySelectorAll('.chip').length > 0) return true;
                }
                return false;
            }
            function type() {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', '');
                    clearTimeout(animationTimeout); return;
                }
                const currentText = texts[ptIndex];
                if (isDeleting) {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex - 1));
                    charIndex--;
                } else {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex + 1));
                    charIndex++;
                }
                let typeSpeed = isDeleting ? 30 : 60;
                if (!isDeleting && charIndex === currentText.length) {
                    typeSpeed = 2500; isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false; ptIndex = (ptIndex + 1) % texts.length; typeSpeed = 500; 
                }
                clearTimeout(animationTimeout); animationTimeout = setTimeout(type, typeSpeed);
            }
            inputEl.addEventListener('input', () => {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', ''); clearTimeout(animationTimeout);
                } else {
                    charIndex = 0; isDeleting = false; clearTimeout(animationTimeout); type();
                }
            });
            if (isChipContainer) {
                const observer = new MutationObserver(() => {
                    if (shouldHidePlaceholder()) {
                        inputEl.setAttribute('placeholder', ''); clearTimeout(animationTimeout);
                    } else if (inputEl.value.length === 0) {
                        charIndex = 0; isDeleting = false; clearTimeout(animationTimeout); type();
                    }
                });
                observer.observe(inputEl.parentElement, { childList: true });
            }
            type();
        }

        setupTypewriter('urlInput', '', ["Digite a sua palavra-chave...", "Ex: masterclass", "Ex: workshop"], true);
        setupTypewriter('channelInput', '', ["Ex: inexploroficial", "Ex: https://youtube.com/@Canal"], true);
        setupTypewriter('descInput', '', ["Ex: Hotmart"], true);
        setupTypewriter('negativeInput', '', ["Ex: webinar"], true);

        // === LIMPADOR DE URLS DE CANAIS ===
        function cleanChannelInput(val) {
            let v = val.trim();
            try {
                if (v.includes('youtube.com') || v.includes('youtu.be')) {
                    const urlObj = new URL(v.startsWith('http') ? v : 'https://' + v);
                    const pathParts = urlObj.pathname.split('/').filter(Boolean);
                    v = pathParts[pathParts.length - 1]; 
                }
            } catch(e) {} 
            if (v.startsWith('@')) v = v.substring(1);
            return v;
        }

        // === NOVO CHIPS SYSTEM INTELIGENTE ===
        function setupChipSystem(inputId, containerId) {
            const input = document.getElementById(inputId); 
            const container = document.getElementById(containerId);
            if (!input || !container) return;
            
            // Tratamento ao colar ou digitar com vírgula no Mobile/Desktop
            input.addEventListener('input', function(e) {
                if (this.value.includes(',')) {
                    let parts = this.value.split(',');
                    for(let i=0; i < parts.length - 1; i++) {
                        let val = parts[i].trim();
                        if (val) {
                            if (containerId === 'channelContainer') val = cleanChannelInput(val);
                            createChipAndOp(val, container, input);
                        }
                    }
                    this.value = parts[parts.length - 1].trimStart();
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault(); 
                    let value = input.value.trim(); 
                    if (value) { 
                        if (containerId === 'channelContainer') value = cleanChannelInput(value);
                        createChipAndOp(value, container, input); 
                        input.value = ''; 
                    }
                } else if (e.key === 'Backspace' && input.value === '') {
                    const chips = container.querySelectorAll('.chip');
                    if (chips.length > 0) {
                        const lastChip = chips[chips.length - 1];
                        const prevNode = lastChip.previousElementSibling;
                        if (prevNode && prevNode.classList.contains('chip-op')) prevNode.remove();
                        lastChip.remove();
                        saveState();
                    }
                }
            });
            
            input.addEventListener('blur', function() {
                let value = input.value.trim().replace(/,$/, '');
                if (value) { 
                    if (containerId === 'channelContainer') value = cleanChannelInput(value);
                    createChipAndOp(value, container, input); 
                    input.value = ''; 
                }
            });
        }

        function createChipAndOp(text, container, input) {
            // Remove espaços fantasma na UI zerando o valor e forçando o scroll para trás
            if(input) input.value = '';
            container.scrollLeft = 0;

            if (container.querySelectorAll('.chip').length > 0) {
                const isMain = container.id === 'mainInputContainer';
                const op = document.createElement('span');
                
                const baseClasses = 'chip-op text-[10px] rounded px-2 py-0.5 cursor-pointer transition-colors select-none font-bold mx-0.5 flex items-center justify-center border flex-shrink-0';
                const andClasses = isMain 
                    ? 'bg-slate-200 border-slate-300 text-slate-600 hover:bg-slate-300 hover:text-slate-800' 
                    : 'bg-white/10 border-white/20 text-slate-300 hover:bg-white/20 hover:text-white';
                const orClasses = isMain
                    ? 'bg-red-100 border-highlight/40 text-highlight hover:bg-red-200'
                    : 'bg-highlight/20 border-highlight/50 text-highlight hover:bg-highlight/30';

                op.className = `${baseClasses} ${andClasses}`;
                op.setAttribute('data-op', 'AND'); 
                op.innerText = 'E';
                
                op.onclick = function(e) {
                    e.stopPropagation();
                    if (this.getAttribute('data-op') === 'AND') {
                        this.setAttribute('data-op', 'OR');
                        this.innerText = 'OU';
                        this.className = `${baseClasses} ${orClasses}`;
                    } else {
                        this.setAttribute('data-op', 'AND');
                        this.innerText = 'E';
                        this.className = `${baseClasses} ${andClasses}`;
                    }
                    saveState();
                };
                container.insertBefore(op, input);
            }

            const chip = document.createElement('span');
            chip.className = 'chip bg-highlight text-white px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm whitespace-nowrap flex-shrink-0';
            chip.setAttribute('data-value', text); 
            chip.innerHTML = `${text} <span class="material-symbols-rounded text-[14px] cursor-pointer hover:text-black transition-colors">close</span>`;
            
            chip.querySelector('span').addEventListener('click', function(e) {
                e.stopPropagation();
                const prevNode = chip.previousElementSibling;
                const nextNode = chip.nextElementSibling;
                
                if (prevNode && prevNode.classList.contains('chip-op')) prevNode.remove();
                else if (nextNode && nextNode.classList.contains('chip-op')) nextNode.remove();
                
                chip.remove();
                saveState();
                if(input) input.focus();
            });

            container.insertBefore(chip, input);
            if(input) input.scrollIntoView({ behavior: "smooth", inline: "start" });
            saveState();
        }

        function clearChips(containerId) {
            const container = document.getElementById(containerId);
            const elements = container.querySelectorAll('.chip, .chip-op');
            elements.forEach(el => el.remove());
            const input = document.getElementById(containerId.replace('Container', 'Input'));
            if(input) { input.value = ''; container.scrollLeft = 0; }
        }

        function addChipWithOp(containerId, text, opBefore = 'AND') {
            const input = document.getElementById(containerId.replace('Container', 'Input'));
            const container = document.getElementById(containerId);
            createChipAndOp(text, container, input);
            
            const ops = container.querySelectorAll('.chip-op');
            if (ops.length > 0) {
                const lastOp = ops[ops.length - 1];
                if (opBefore === 'OR' && lastOp.getAttribute('data-op') === 'AND') {
                    lastOp.click();
                } else if (opBefore === 'AND' && lastOp.getAttribute('data-op') === 'OR') {
                    lastOp.click();
                }
            }
        }

        function getLogicTokens(containerId) {
            const container = document.getElementById(containerId);
            const tokens = [];
            container.childNodes.forEach(node => {
                if (node.classList && node.classList.contains('chip')) {
                    tokens.push({ type: 'word', value: node.getAttribute('data-value').trim() });
                } else if (node.classList && node.classList.contains('chip-op')) {
                    tokens.push({ type: 'op', value: node.getAttribute('data-op') });
                }
            });
            return tokens;
        }

        setupChipSystem('urlInput', 'mainInputContainer');
        setupChipSystem('channelInput', 'channelContainer');
        setupChipSystem('descInput', 'descContainer');
        setupChipSystem('negativeInput', 'negativeContainer');

        // Função Imagem da Bandeira por País (Dicionário de Fallbacks Inteligente)
        const langToCountryMap = {
            'pt': 'br', 'en': 'us', 'es': 'es', 'fr': 'fr', 'de': 'de', 'it': 'it',
            'ja': 'jp', 'ko': 'kr', 'ru': 'ru', 'zh': 'cn', 'ar': 'sa', 'hi': 'in'
        };

        function getCountryName(code) {
            const select = document.getElementById('countryFilter');
            const option = select.querySelector(`option[value="${code.toUpperCase()}"]`);
            return option ? option.innerText : code.toUpperCase();
        }
        
        function getFlagImg(countryCode) {
            let finalCode = countryCode.toLowerCase();
            if (langToCountryMap[finalCode]) {
                finalCode = langToCountryMap[finalCode];
            }
            if (!finalCode) return '';
            
            const name = getCountryName(finalCode);
            // Uso de onError para não mostrar broken image, substitui por um ícone de mundo se falhar
            return `<img src="https://flagcdn.com/w40/${finalCode}.png" alt="${name}" onerror="this.outerHTML='<span class=\\'material-symbols-rounded text-white\\'>public</span>'" class="w-6 h-auto object-contain rounded-sm shadow-sm">`;
        }

        // === AVALIADOR LÓGICO INTELIGENTE ===
        function evaluateLogicCustom(tokens, matchFn) {
            if (tokens.length === 0) return true;
            let expr = tokens.map(t => t.type === 'word' ? matchFn(t.value) : t.value);
            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === 'AND') { expr.splice(i - 1, 3, expr[i-1] && expr[i+1]); i--; }
            }
            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === 'OR') { expr.splice(i - 1, 3, expr[i-1] || expr[i+1]); i--; }
            }
            return expr[0];
        }

        function buildQueryString(tokens, prefix = '') {
             if(tokens.length === 0) return '';
             return tokens.map(t => {
                 if(t.type === 'word') return prefix ? `${prefix}:"${t.value}"` : `"${t.value}"`;
                 return t.value === 'OR' ? '' : ''; // Removido Parênteses e | que bloqueavam a API do YouTube
             }).join(' ').replace(/\s+/g, ' ').trim();
        }

        // Fetch com Timeout Limitado a 15 segundos para evitar Load Infinito
        async function fetchWithTimeout(resource, options = {}) {
            const { timeout = 15000 } = options;
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            const response = await fetch(resource, { ...options, signal: controller.signal });
            clearTimeout(id);
            return response;
        }

        // =====================================
        // MOTOR PRINCIPAL DE BUSCA DA API
        // =====================================
        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const loadMoreContainer = document.getElementById('loadMoreContainer');

        searchBtn.addEventListener('click', () => {
            if(isFiltersOpen) {
                document.getElementById('toggleFiltersBtn').click();
            }

            globalNextPageToken = '';
            globalAccumulatedItems = [];
            globalTotalResultsAPI = 0;
            resultsGrid.innerHTML = '';
            document.getElementById('resultsCount').textContent = '0';
            performSearch(false);
        });

        loadMoreBtn.addEventListener('click', () => {
            performSearch(true);
        });

        async function performSearch(isLoadMore) {
            hideAlert();
            resultsContainer.classList.remove('hidden');
            
            if (!isLoadMore) {
                loadingIndicator.classList.remove('hidden');
                loadingIndicator.classList.add('flex');
            } else {
                loadMoreBtn.innerHTML = `<span class="material-symbols-rounded animate-spin">autorenew</span> A carregar...`;
                loadMoreBtn.classList.add('opacity-50', 'pointer-events-none');
            }
            
            updateScrollState();
            loadMoreContainer.classList.add('hidden');

            const mainTokens = getLogicTokens('mainInputContainer');
            const descTokens = getLogicTokens('descContainer');
            const negativeTokens = getLogicTokens('negativeContainer');
            const channelTokens = getLogicTokens('channelContainer');
            
            const lang = document.getElementById('langFilter').value;
            const country = document.getElementById('countryFilter').value;
            const status = document.getElementById('statusFilter').value;
            const subsSize = document.getElementById('subsFilter').value;
            const dateStart = document.getElementById('dateStart').value;
            const dateEnd = document.getElementById('dateEnd').value;

            let queryParts = [];
            // O YouTube detesta parênteses e múltiplas aspas confusas. Injetamos apenas as strings cruas
            if (mainTokens.length > 0) queryParts.push(buildQueryString(mainTokens, 'intitle'));
            if (descTokens.length > 0) queryParts.push(buildQueryString(descTokens));
            if (channelTokens.length > 0) queryParts.push(buildQueryString(channelTokens));
            
            const hasAndInNegatives = negativeTokens.some(t => t.value === 'AND');
            if (negativeTokens.length > 0 && !hasAndInNegatives) {
                const negWords = negativeTokens.filter(t => t.type === 'word').map(t => `-"${t.value}"`).join(' ');
                if (negWords) queryParts.push(negWords);
            }

            const q = queryParts.join(' ');

            let baseSearchUrl = `${CF_WORKER_URL}/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(q)}`;
            if (lang) baseSearchUrl += `&relevanceLanguage=${lang}`;
            if (country) baseSearchUrl += `&regionCode=${country}`;
            
            // Status no YouTube API (Ao Vivo/Agendado/Completed)
            if (status !== 'all') baseSearchUrl += `&eventType=${status}`;
            
            // Datas na API (apenas filtra vídeos lançados nesse período, pós-filtro refina Live Details)
            if (dateStart) baseSearchUrl += `&publishedAfter=${encodeURIComponent(formatYTDate(dateStart, false))}`;
            if (dateEnd) baseSearchUrl += `&publishedBefore=${encodeURIComponent(formatYTDate(dateEnd, true))}`;

            try {
                // Sistema Auto-Suga: Avança até 3 páginas internamente se o filtro JS devolver 0 resultados
                let loopCount = 0;
                let finalItems = [];
                let currentNextPageToken = isLoadMore ? globalNextPageToken : '';

                while (loopCount < 3 && finalItems.length === 0) {
                    let searchUrl = baseSearchUrl;
                    if (currentNextPageToken) searchUrl += `&pageToken=${currentNextPageToken}`;

                    const searchResponse = await fetchWithTimeout(searchUrl, { timeout: 15000 });
                    const searchData = await searchResponse.json();

                    if (searchData.error) throw new Error(searchData.error.message);

                    if (!isLoadMore && loopCount === 0) {
                        globalTotalResultsAPI = searchData.pageInfo?.totalResults || 0;
                    }

                    currentNextPageToken = searchData.nextPageToken || '';
                    let items = searchData.items || [];

                    if(items.length === 0) break;

                    // PÓS-FILTRO JAVASCRIPT RIGOROSO (As palavras DEVEM cumprir o E/OU exato)
                    items = items.filter(item => {
                        const title = (item.snippet.title || '').toLowerCase();
                        const desc = (item.snippet.description || '').toLowerCase();
                        const channelTitle = (item.snippet.channelTitle || '').toLowerCase();
                        const channelId = item.snippet.channelId;

                        if (!evaluateLogicCustom(mainTokens, (kw) => title.includes(kw.toLowerCase()))) return false;
                        if (!evaluateLogicCustom(descTokens, (kw) => desc.includes(kw.toLowerCase()))) return false;
                        if (negativeTokens.length > 0 && evaluateLogicCustom(negativeTokens, (kw) => title.includes(kw.toLowerCase()) || desc.includes(kw.toLowerCase()))) return false;

                        if (!evaluateLogicCustom(channelTokens, (kw) => {
                            const lowKw = kw.toLowerCase();
                            const cTitleNoSpace = channelTitle.replace(/\s+/g, '');
                            const kwNoSpace = lowKw.replace(/\s+/g, '');
                            return channelId === kw || channelTitle.includes(lowKw) || cTitleNoSpace.includes(kwNoSpace) || kwNoSpace.includes(cTitleNoSpace);
                        })) return false;

                        return true;
                    });

                    // FILTRO DE INSCRITOS (Channels API)
                    const subsMap = {};
                    const channelHandleMap = {};
                    if (items.length > 0) {
                        const uniqueChannelIds = [...new Set(items.map(item => item.snippet.channelId))];
                        const channelsUrl = `${CF_WORKER_URL}/channels?part=statistics,snippet&id=${uniqueChannelIds.join(',')}`;
                        const channelsResponse = await fetchWithTimeout(channelsUrl);
                        const channelsData = await channelsResponse.json();
                        
                        if(channelsData.items) {
                            channelsData.items.forEach(ch => { 
                                subsMap[ch.id] = parseInt(ch.statistics.subscriberCount || 0, 10); 
                                channelHandleMap[ch.id] = ch.snippet?.customUrl || '';
                            });
                        }

                        if(subsSize !== 'all') {
                            items = items.filter(item => {
                                const count = subsMap[item.snippet.channelId] || 0;
                                if (subsSize === 'small') return count <= 10000;
                                if (subsSize === 'medium') return count > 10000 && count <= 100000;
                                if (subsSize === 'large') return count > 100000;
                                return true;
                            });
                        }
                    }

                    // BUSCA DE ESTATÍSTICAS E PAÍS DO VÍDEO (Videos API)
                    if (items.length > 0) {
                        const videoIds = items.map(item => item.id.videoId).join(',');
                        const videosUrl = `${CF_WORKER_URL}/videos?part=snippet,statistics,liveStreamingDetails&id=${videoIds}`;
                        const videosResponse = await fetchWithTimeout(videosUrl);
                        const videosData = await videosResponse.json();

                        const statsMap = {};
                        const liveDetailsMap = {};
                        const videoCountryMap = {};
                        
                        if(videosData.items) {
                            videosData.items.forEach(v => {
                                statsMap[v.id] = v.statistics || {};
                                liveDetailsMap[v.id] = v.liveStreamingDetails || null;
                                
                                let langCode = v.snippet?.defaultAudioLanguage || v.snippet?.defaultLanguage || '';
                                let countryExtracted = langCode.includes('-') ? langCode.split('-')[1] : langCode;
                                videoCountryMap[v.id] = countryExtracted.toUpperCase();
                            });
                        }

                        items.forEach(item => {
                            const stats = statsMap[item.id.videoId] || {};
                            item.commentCount = parseInt(stats.commentCount || 0, 10);
                            item.viewCount = parseInt(stats.viewCount || 0, 10); 
                            item.subscriberCount = subsMap[item.snippet.channelId] || 0; 
                            item.liveDetails = liveDetailsMap[item.id.videoId];
                            item.videoCountryCode = videoCountryMap[item.id.videoId] || ''; 
                            item.channelHandle = channelHandleMap[item.snippet.channelId] || '';
                        });
                    }

                    // HARMONIA MATEMÁTICA ENTRE STATUS E DATAS
                    items = items.filter(item => {
                        const now = new Date();
                        const liveContent = item.snippet.liveBroadcastContent; 
                        const scheduledStart = item.liveDetails?.scheduledStartTime ? new Date(item.liveDetails.scheduledStartTime) : null;
                        const actualEnd = item.liveDetails?.actualEndTime ? new Date(item.liveDetails.actualEndTime) : null;
                        const publishedAt = new Date(item.snippet.publishedAt);

                        // O Target Data real considera primeiramente a data da Live real, depois a publicação
                        const targetDateForFilter = scheduledStart || actualEnd || publishedAt;

                        // Conversa entre Status e Filtro de Datas Visual
                        if (dateStart || dateEnd) {
                            const dStart = dateStart ? new Date(dateStart + "T00:00:00Z") : null;
                            const dEnd = dateEnd ? new Date(dateEnd + "T23:59:59Z") : null;
                            if (dStart && targetDateForFilter < dStart) return false;
                            if (dEnd && targetDateForFilter > dEnd) return false;
                        }

                        // Conversa do Status vs Tempo Real
                        if (status !== 'all') {
                            if (status === 'live' && liveContent !== 'live') return false; 
                            if (status === 'upcoming') {
                                if (liveContent !== 'upcoming') return false;
                                if (scheduledStart && scheduledStart <= now) return false; // Se a data agendada já passou, esconde!
                            }
                            if (status === 'completed') {
                                if (liveContent === 'live' || liveContent === 'upcoming') return false;
                                if (targetDateForFilter > now) return false; // Impede vídeo agendado bugado de aparecer aqui
                            }
                        }
                        return true;
                    });

                    finalItems = items;
                    loopCount++;
                    
                    if (finalItems.length === 0 && !currentNextPageToken) break;
                }

                globalNextPageToken = currentNextPageToken;
                globalAccumulatedItems = globalAccumulatedItems.concat(finalItems);

                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                
                loadMoreBtn.innerHTML = `<span class="material-symbols-rounded">refresh</span> Carregar Mais Lançamentos`;
                loadMoreBtn.classList.remove('opacity-50', 'pointer-events-none');

                if (globalAccumulatedItems.length === 0 && !globalNextPageToken) {
                    resultsGrid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 font-medium bg-white/5 rounded-2xl">Nenhum lançamento encontrado que atenda a todas as regras estipuladas nesta busca.</div>`;
                    return;
                }

                renderGrid(globalAccumulatedItems);

                if (globalNextPageToken) {
                    loadMoreContainer.classList.remove('hidden');
                } else {
                    loadMoreContainer.classList.add('hidden');
                }

            } catch (error) {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                loadMoreBtn.innerHTML = `<span class="material-symbols-rounded">refresh</span> Tentar Novamente`;
                loadMoreBtn.classList.remove('opacity-50', 'pointer-events-none');
                
                let errorMsg = error.message;
                if (error.name === 'AbortError') errorMsg = "A ligação demorou muito a responder. A pesquisa foi interrompida (Timeout) para não bloquear o seu ecrã. Tente novamente.";
                showAlert(`Erro na busca: ${errorMsg}`, true);
            }
        }

        // === RENDERIZADOR ===
        function renderGrid(itemsArray) {
            const sortFilterVal = document.getElementById('sortFilter').value;
            let itemsToRender = [...itemsArray];

            if (sortFilterVal === 'views') {
                itemsToRender.sort((a, b) => b.viewCount - a.viewCount);
            } else if (sortFilterVal === 'comments') {
                itemsToRender.sort((a, b) => b.commentCount - a.commentCount);
            } else if (sortFilterVal === 'subs') {
                itemsToRender.sort((a, b) => b.subscriberCount - a.subscriberCount);
            }

            // Exibe a quantidade processada no ecrã e o Total que a API encontrou
            const displayTotal = globalTotalResultsAPI > 0 ? ` de ${globalTotalResultsAPI.toLocaleString('pt-PT')}` : '';
            document.getElementById('resultsCount').textContent = `${itemsToRender.length}${displayTotal}`;
            
            resultsGrid.innerHTML = '';

            itemsToRender.forEach(item => {
                const videoId = item.id.videoId;
                const snippet = item.snippet;
                const commentCount = item.commentCount || 0;
                const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;
                
                // Bandeira do Vídeo em Imagem Pílula
                const flagImg = getFlagImg(item.videoCountryCode);
                const countryName = getCountryName(item.videoCountryCode);
                
                let flagPill = '';
                if(item.videoCountryCode && flagImg) {
                    flagPill = `<div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md border border-white/20 px-3 py-1.5 rounded-full drop-shadow-lg flex items-center justify-center cursor-default" title="${countryName}">
                                    ${flagImg}
                                </div>`;
                }

                // Pílulas com Cores Fixas Vermelhas Absolutas
                let statusBadge = '';
                if(snippet.liveBroadcastContent === 'live') {
                    statusBadge = `<div class="absolute top-4 left-4 bg-[#DC2626] text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold flex items-center gap-1.5 shadow-lg border border-[#B91C1C]">
                                      <span class="material-symbols-rounded text-[14px] sm:text-[16px]">sensors</span> Ao Vivo
                                   </div>`;
                } else if (snippet.liveBroadcastContent === 'upcoming') {
                    statusBadge = `<div class="absolute top-4 left-4 bg-[#DC2626] text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold flex items-center gap-1.5 shadow-lg border border-[#B91C1C]">
                                      <span class="material-symbols-rounded text-[14px] sm:text-[16px]">schedule</span> Agendado
                                   </div>`;
                }

                const parser = new DOMParser();
                const decodedTitle = parser.parseFromString(snippet.title, 'text/html').body.textContent;
                
                const targetDate = item.liveDetails?.scheduledStartTime ? new Date(item.liveDetails.scheduledStartTime) : new Date(snippet.publishedAt);
                const pubDate = targetDate.toLocaleDateString('pt-PT');
                const formattedComments = commentCount.toLocaleString('pt-PT');

                // AFILIADO HOTMART
                const hotmartRegex = /(https?:\/\/(?:go\.|pay\.|www\.)?hotmart\.com\/[^\s]+)/i;
                const hotmartMatch = snippet.description.match(hotmartRegex);
                let afiliarBtn = '';
                
                if (hotmartMatch && hotmartMatch[1]) {
                    const hotmartUrl = hotmartMatch[1];
                    const inexplorUrl = `https://inexplor.grupobhds.com/desbloqueio-produto-oculto/hotmart?po=${encodeURIComponent(hotmartUrl)}`;
                    
                    afiliarBtn = `
                        <button onclick="window.open('${inexplorUrl}', '_blank'); event.stopPropagation();" title="Afiliar-se na Hotmart" class="w-10 h-10 rounded-full bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-colors flex items-center justify-center border border-white/10 shadow-sm flex-shrink-0">
                            <span class="material-symbols-rounded text-[18px]">attach_money</span>
                        </button>
                    `;
                }

                const card = document.createElement('article');
                card.className = "video-card bg-[#0F172A] border border-white/10 rounded-[2rem] overflow-hidden flex flex-col relative z-10 shadow-xl cursor-pointer group";
                card.onclick = () => window.open(videoUrl, '_blank');
                
                card.innerHTML = `
                    <div class="relative aspect-video overflow-hidden bg-slate-900">
                        <img src="${snippet.thumbnails.high?.url || snippet.thumbnails.medium?.url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        ${statusBadge}
                        ${flagPill}
                    </div>
                    <div class="p-6 sm:p-7 flex flex-col flex-grow bg-gradient-to-b from-transparent to-[#080B14]">
                        <h3 class="text-base sm:text-lg md:text-xl font-bold leading-snug mb-3 text-white line-clamp-2" title="${decodedTitle}">${decodedTitle}</h3>
                        
                        <div class="flex items-center gap-2 text-slate-400 mb-6 cursor-pointer w-fit group/channel relative" onclick="openChannelAndCopy(event, '${item.channelHandle}', '${snippet.channelId}', this)" title="Abrir guia do Canal e Copiar @">
                            <span class="material-symbols-rounded text-[18px] flex-shrink-0 group-hover/channel:text-white transition-colors">account_circle</span>
                            <div class="channel-hover-effect">
                                <span class="text-sm font-semibold">${snippet.channelTitle}</span>
                            </div>
                        </div>
                        
                        <div class="mt-auto flex flex-row items-end justify-between border-t border-white/10 pt-5 gap-3">
                            <div class="flex flex-wrap items-center gap-x-5 gap-y-2 flex-grow overflow-hidden">
                                <div class="flex flex-col flex-shrink-0">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Data</span>
                                    <span class="text-sm text-slate-300 font-medium">${pubDate}</span>
                                </div>
                                <div class="flex flex-col flex-shrink-0">
                                    <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Comentários</span>
                                    <span class="text-sm text-slate-300 font-medium flex items-center gap-1.5">
                                        <span class="material-symbols-rounded text-[14px]">chat_bubble</span>
                                        ${formattedComments}
                                    </span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 relative z-20 flex-shrink-0">
                                ${afiliarBtn}
                                <button onclick="copyToClipboard(event, '${videoUrl}', this)" title="Copiar URL do Vídeo" class="w-10 h-10 rounded-full bg-white/5 text-slate-300 hover:bg-white/10 hover:text-white transition-colors flex items-center justify-center border border-white/10 shadow-sm flex-shrink-0">
                                    <span class="material-symbols-rounded text-[18px]">content_copy</span>
                                </button>
                                <button class="w-10 h-10 rounded-full bg-white/5 group-hover:bg-highlight group-hover:text-white transition-colors flex items-center justify-center border border-white/10 shadow-sm flex-shrink-0">
                                    <span class="material-symbols-rounded text-[20px]">arrow_forward</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
