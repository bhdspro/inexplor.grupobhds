<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unilançamento - Descubra e Monitore Lançamentos</title>
    
    <!-- Tipografia Moderna (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        surface: '#0F172A',
                        highlight: 'rgb(220, 38, 38)',
                        borderStrong: 'rgb(185, 28, 28)'
                    }
                }
            }
        }
    </script>

    <!-- Biblioteca de Partículas -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow-x: hidden;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        /* Permite seleção no input */
        input, select, textarea, a {
            user-select: auto;
            -webkit-user-select: auto;
            -moz-user-select: auto;
        }

        /* Estilo Card Principal */
        .glass-card {
            background: #0F172A; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 2px solid theme('colors.borderStrong'); 
        }

        /* Wrapper do Input Principal */
        .info-field-wrapper {
            background: #ffffff;
            border-radius: 1.5rem; 
            border: 2px solid transparent;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .info-field-wrapper:focus-within {
            border-color: rgba(220, 38, 38, 0.5);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        @media (min-width: 768px) {
            .info-field-wrapper { border-radius: 9999px; }
        }

        /* Estilização scrollbars e ícone de calendário */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        /* Hover dos Cards de Vídeo */
        .video-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(220, 38, 38, 0.2);
            border-color: theme('colors.highlight');
        }

        /* Estilo das Tags/Chips */
        .chip {
            animation: popIn 0.2s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-6 selection:bg-highlight selection:text-white relative">

    <div id="particles-js"></div>

    <!-- Header Simples -->

        <div class="flex items-center gap-2">

                                <input type="text" id="descInput" class="flex-grow bg-transparent border-none outline-none text-slate-300 placeholder-slate-500 text-sm font-semibold min-w-[150px] py-1">

        <!-- Área de Resultados (Inicia Oculta) -->

            <!-- Grid de Cards -->

                <!-- Os cards serão injetados aqui via JS -->

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-white/10 border-t-highlight rounded-full animate-spin mb-4"></div>

    <script>
        // === LÓGICA DO ACORDEÃO DOS FILTROS (Efeito Sanfona) ===
        const toggleFiltersBtn = document.getElementById('toggleFiltersBtn');
        const filtersWrapper = document.getElementById('filtersWrapper');
        const filtersArrow = document.getElementById('filtersArrow');
        let isFiltersOpen = false;

        toggleFiltersBtn.addEventListener('click', () => {
            isFiltersOpen = !isFiltersOpen;
            if(isFiltersOpen) {
                filtersWrapper.classList.remove('max-h-0', 'opacity-0');
                filtersWrapper.classList.add('max-h-[2000px]', 'opacity-100');
                filtersArrow.classList.add('rotate-180');
            } else {
                filtersWrapper.classList.add('max-h-0', 'opacity-0');
                filtersWrapper.classList.remove('max-h-[2000px]', 'opacity-100');
                filtersArrow.classList.remove('rotate-180');
            }
        });

        // === FUNÇÃO DA MÁQUINA DE ESCREVER COM OCULTAÇÃO INTELIGENTE ===
        function setupTypewriter(inputId, prefix, texts, isChipContainer = false) {
            let ptIndex = 0; 
            let charIndex = 0; 
            let isDeleting = false;
            let animationTimeout;
            const inputEl = document.getElementById(inputId);

            if (!inputEl) return;

            function shouldHidePlaceholder() {
                if (inputEl.value.length > 0) return true;
                if (isChipContainer) {
                    const container = inputEl.parentElement;
                    if (container.querySelectorAll('.chip').length > 0) return true;
                }
                return false;
            }

            function type() {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', '');
                    clearTimeout(animationTimeout);
                    return;
                }

                const currentText = texts[ptIndex];
                
                if (isDeleting) {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex - 1));
                    charIndex--;
                } else {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex + 1));
                    charIndex++;
                }

                let typeSpeed = isDeleting ? 30 : 60;

                if (!isDeleting && charIndex === currentText.length) {
                    typeSpeed = 2500;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    ptIndex = (ptIndex + 1) % texts.length;
                    typeSpeed = 500; 
                }

                clearTimeout(animationTimeout);
                animationTimeout = setTimeout(type, typeSpeed);
            }

            inputEl.addEventListener('input', () => {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', '');
                    clearTimeout(animationTimeout);
                } else {
                    charIndex = 0;
                    isDeleting = false;
                    clearTimeout(animationTimeout);
                    type();
                }
            });

            if (isChipContainer) {
                const observer = new MutationObserver(() => {
                    if (shouldHidePlaceholder()) {
                        inputEl.setAttribute('placeholder', '');
                        clearTimeout(animationTimeout);
                    } else if (inputEl.value.length === 0) {
                        charIndex = 0;
                        isDeleting = false;
                        clearTimeout(animationTimeout);
                        type();
                    }
                });
                observer.observe(inputEl.parentElement, { childList: true });
            }
            
            type();
        }

        // Inicializar Máquinas de Escrever (O campo principal agora é ChipContainer = true)
        setupTypewriter('urlInput', '', [
            "Digite sua palavra-chave...",
            "Ex: evento",
            "Ex: aula",
            "Ex: imersão",
            "Ex: masterclass",
            "Ex: maratona",
            "Ex: workshop",
            "Ex: jornada",
            "Ex: intensivo",
            "Ex: intensivão"
        ], true);

        setupTypewriter('channelInput', '', [
            "Ex: @caiocalderaro",
            "Ex: @inexploroficial",
            "Ex: UCyFbTJjYi6tpWgdcS7",
            "Ex: https://youtube.com/@inexploroficial"
        ], true);

        setupTypewriter('descInput', '', [
            "Ex: https://go.hotmart.com",
            "Ex: WhatsApp",
            "Ex: Aula 2",
            "Ex: Entre no Grupo"
        ], true);

        setupTypewriter('negativeInput', '', [
            "Ex: minicurso",
            "Ex: webinar",
            "Ex: playlist",
            "Ex: vagas encerradas"
        ], true);

        // === SISTEMA DE CHIPS (Tags) PARA OS FILTROS ===
        function setupChipSystem(inputId, containerId) {
            const input = document.getElementById(inputId);
            const container = document.getElementById(containerId);

            if (!input || !container) return;

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    let value = input.value.trim().replace(/,$/, ''); 
                    if (value) {
                        createChip(value, container, input);
                        input.value = ''; 
                    }
                } else if (e.key === 'Backspace' && input.value === '') {
                    const chips = container.querySelectorAll('.chip');
                    if (chips.length > 0) {
                        chips[chips.length - 1].remove();
                    }
                }
            });

            input.addEventListener('blur', function() {
                let value = input.value.trim().replace(/,$/, '');
                if (value) {
                    createChip(value, container, input);
                    input.value = '';
                }
            });
        }

        function createChip(text, container, input) {
            const chip = document.createElement('span');
            chip.className = 'chip bg-highlight text-white px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm whitespace-nowrap';
            chip.innerHTML = `
                ${text} 
                <span class="material-symbols-rounded text-[14px] cursor-pointer hover:text-black transition-colors" onclick="this.parentElement.remove()">close</span>
            `;
            container.insertBefore(chip, input);
        }

        // Ativar o sistema de chips em todos os 4 campos (incluindo o principal)
        setupChipSystem('urlInput', 'mainInputContainer');
        setupChipSystem('channelInput', 'channelContainer');
        setupChipSystem('descInput', 'descContainer');
        setupChipSystem('negativeInput', 'negativeContainer');


        // === CONFIGURAÇÃO PARTICLES.JS ===
        try {
            if(typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                  "particles": {
                    "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#dc2626" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4, "random": false },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#dc2626", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "out_mode": "out" }
                  },
                  "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": false } }, "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } } },
                  "retina_detect": true
                });
            }
        } catch (e) { console.error("Partículas não inicializadas."); }

        // === DADOS MOCK E RENDERIZAÇÃO DE CARDS ===
        const mockVideos = [
            {
                title: "AULA 01: O Segredo do Marketing Digital em 2026",
                channel: "Especialista em Vendas",
                thumbnail: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                status: "Ao Vivo",
                viewers: "1.2k assistindo",
                date: "Agora"
            },
            {
                title: "Lançamento Oficial: Mentoria Código de Riqueza",
                channel: "Thiago Finanças",
                thumbnail: "https://images.unsplash.com/photo-1556761175-5973dc0f32e7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                status: "Agendado",
                viewers: "Agendado para 20:00",
                date: "Hoje"
            },
            {
                title: "Como criar automações com Google Apps Script",
                channel: "Dev Na Prática",
                thumbnail: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80",
                status: "Finalizado",
                viewers: "45 mil views",
                date: "Há 2 dias"
            }
        ];

        const resultsContainer = document.getElementById('resultsContainer');
        const resultsGrid = document.getElementById('resultsGrid');
        const searchBtn = document.getElementById('searchBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');

        function createCard(video) {
            let statusStyle = "bg-slate-800 text-white border-slate-600";
            let statusIcon = "play_circle";
            let pulseClass = "";
            
            if (video.status === "Ao Vivo") {
                statusStyle = "bg-highlight/20 text-highlight border-highlight backdrop-blur-md";
                statusIcon = "sensors";
                pulseClass = "animate-pulse";
            } else if (video.status === "Agendado") {
                statusStyle = "bg-amber-500/20 text-amber-400 border-amber-500/50 backdrop-blur-md";
                statusIcon = "schedule";
            } else if (video.status === "Finalizado") {
                statusStyle = "bg-green-500/20 text-green-400 border-green-500/50 backdrop-blur-md";
                statusIcon = "task_alt";
            }

            return `
                <article class="video-card bg-[#0F172A] border border-white/10 rounded-[2rem] overflow-hidden flex flex-col relative z-10 shadow-xl">
                    <div class="relative aspect-video overflow-hidden">
                        <img src="${video.thumbnail}" alt="Thumbnail" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                        
                        <!-- Badge de Status -->
                        <div class="absolute top-4 left-4 ${statusStyle} border px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-lg ${pulseClass}">
                            <span class="material-symbols-rounded text-[16px]">${statusIcon}</span>
                            ${video.status}
                        </div>
                    </div>

                    <div class="p-6 flex flex-col flex-grow bg-gradient-to-b from-transparent to-[#080B14]">
                        <h3 class="text-lg font-bold leading-tight mb-3 text-white line-clamp-2">${video.title}</h3>
                        
                        <div class="flex items-center gap-2 text-slate-400 mb-4">
                            <span class="material-symbols-rounded text-[18px]">account_circle</span>
                            <span class="text-sm font-semibold">${video.channel}</span>
                        </div>
                        
                        <div class="mt-auto flex items-center justify-between border-t border-white/10 pt-4">
                            <div class="flex flex-col">
                                <span class="text-xs text-slate-500 font-bold uppercase tracking-wider">${video.date}</span>
                                <span class="text-sm text-slate-300 font-medium">${video.viewers}</span>
                            </div>
                            
                            <button class="w-10 h-10 rounded-full bg-white/5 hover:bg-highlight hover:text-white transition-colors flex items-center justify-center border border-white/10 hover:border-transparent">
                                <span class="material-symbols-rounded text-[20px]">arrow_forward</span>
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }

        searchBtn.addEventListener('click', () => {
            resultsContainer.classList.remove('hidden');
            resultsGrid.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            
            setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                const shuffled = [...mockVideos].sort(() => 0.5 - Math.random());
                resultsGrid.innerHTML = shuffled.map(createCard).join('');
            }, 1500);
        });

    </script>
</body>
</html>
