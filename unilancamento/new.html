<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unilançamento - Descubra e Monitore Lançamentos</title>
    
    <!-- Tipografia Moderna (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        surface: '#0F172A',
                        highlight: 'rgb(220, 38, 38)',
                        borderStrong: 'rgb(185, 28, 28)'
                    }
                }
            }
        }
    </script>

    <!-- Biblioteca de Partículas -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow-x: hidden;
            color: #ffffff;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            /* Inicia sem scroll e centralizado */
            overflow-y: hidden; 
        }

        /* Permite seleção no input */
        input, select, textarea, a {
            user-select: auto;
            -webkit-user-select: auto;
            -moz-user-select: auto;
        }

        /* Estilo Card Principal com Efeito Glass e Borda (Especificações exatas) */
        .glass-card {
            background: #0F172A; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 2px solid rgb(185, 28, 28); 
        }

        /* Reflexo superior do card */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            z-index: 2;
        }

        /* Wrapper do Input Principal */
        .info-field-wrapper {
            background: #ffffff;
            border-radius: 1.5rem; 
            border: 2px solid transparent;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .info-field-wrapper:focus-within {
            border-color: rgba(220, 38, 38, 0.5);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }

        @media (min-width: 768px) {
            .info-field-wrapper { border-radius: 9999px; }
        }

        /* Estilização scrollbars e ícone de calendário */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        #particles-js {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        /* Hover dos Cards de Vídeo */
        .video-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(220, 38, 38, 0.2);
            border-color: theme('colors.highlight');
        }

        /* Estilo das Tags/Chips */
        .chip {
            animation: popIn 0.2s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body id="mainBody" class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 selection:bg-highlight selection:text-white relative transition-all duration-500">

    <div id="particles-js"></div>

    <!-- Header Posicionado de forma absoluta para não afetar o centro real do card -->
    <header class="absolute top-8 w-full max-w-4xl flex items-center justify-between z-10 px-8">
        <div class="flex items-center gap-2">
            <span class="text-xl font-bold tracking-wide text-white">Unilançamento</span>
        </div>
    </header>

    <div id="heroSection" class="w-full max-w-4xl z-10 flex flex-col items-center transition-all duration-500">
        <!-- Card Central Principal (Hero) -->
        <div class="glass-card relative w-full text-center p-6 sm:p-8 md:p-12 mx-auto">
            
            <div class="relative z-10">
                <!-- Título -->
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white tracking-tight mb-4 drop-shadow-md leading-tight">
                    Descubra e Monitore Lançamentos
                </h1>
                <!-- Subtítulo -->
                <p class="text-base sm:text-lg md:text-xl text-slate-300 font-medium max-w-3xl mx-auto mb-2 drop-shadow-sm text-balance">
                    Descubra novos lançamentos de forma inteligente e fuja da concorrência
                </p>

                <!-- Campo de Busca Principal -->
                <div class="info-field-wrapper mt-8 md:mt-10 p-2 md:p-2.5 w-full mx-auto">
                    <div class="flex flex-col md:flex-row items-stretch gap-3 md:gap-0">
                        <!-- Container flexível para as Tags -->
                        <div id="mainInputContainer" class="w-full flex-1 flex flex-wrap items-center bg-slate-50 md:bg-transparent rounded-xl md:rounded-l-full px-6 py-4 relative z-20 cursor-text min-h-[60px]" onclick="document.getElementById('urlInput').focus()">
                            <svg class="w-6 h-6 text-slate-400 shrink-0 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            <input 
                                type="text" 
                                id="urlInput" 
                                class="flex-grow bg-transparent text-base md:text-lg outline-none text-slate-900 placeholder-slate-500 font-bold min-w-[200px]"
                            >
                        </div>
                        <!-- Botão Buscar -->
                        <button 
                            id="searchBtn" 
                            class="w-full md:w-auto bg-[rgb(220,38,38)] border border-[rgb(185,28,28)] hover:bg-[rgb(190,30,30)] text-white font-bold text-base md:text-lg px-8 py-4 rounded-xl md:rounded-full transform hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] transition-all shadow-lg shadow-[rgba(220,38,38,0.4)] flex items-center justify-center gap-2 z-20 relative whitespace-nowrap"
                        >
                            <span class="material-symbols-rounded">manage_search</span>
                            <span>Buscar Lançamento</span>
                        </button>
                    </div>
                </div>

                <!-- Botão para Abrir/Fechar Filtros -->
                <button id="toggleFiltersBtn" class="mt-6 mx-auto flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-bold relative z-20 group">
                    <span class="material-symbols-rounded text-[20px] group-hover:text-highlight transition-colors">tune</span>
                    <span>Filtros Avançados</span>
                    <span id="filtersArrow" class="material-symbols-rounded text-[20px] transition-transform duration-300">expand_more</span>
                </button>

                <!-- === ÁREA DE FILTROS ULTRA COMPACTA (Efeito Sanfona) === -->
                <div id="filtersWrapper" class="max-h-0 opacity-0 overflow-hidden transition-all duration-500 ease-in-out w-full max-w-md mx-auto">
                    <div class="pt-6 grid grid-cols-1 sm:grid-cols-2 gap-4 w-full text-left">
                        
                        <!-- Coluna 1: Idioma -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Idioma</label>
                            <select class="w-full h-full min-h-[48px] bg-surface/50 border border-white/10 hover:border-highlight/50 text-slate-300 rounded-xl px-4 py-3 outline-none focus:border-highlight transition-colors cursor-pointer text-sm font-semibold">
                                <option value="" class="bg-surface">Todos os Idiomas</option>
                                <option value="pt" class="bg-surface">Português</option>
                                <option value="en" class="bg-surface">Inglês</option>
                                <option value="es" class="bg-surface">Espanhol</option>
                                <option value="fr" class="bg-surface">Francês</option>
                                <option value="de" class="bg-surface">Alemão</option>
                                <option value="it" class="bg-surface">Italiano</option>
                                <option value="ja" class="bg-surface">Japonês</option>
                                <option value="ko" class="bg-surface">Coreano</option>
                                <option value="zh" class="bg-surface">Chinês</option>
                                <option value="hi" class="bg-surface">Hindi</option>
                                <option value="ru" class="bg-surface">Russo</option>
                            </select>
                        </div>

                        <!-- Coluna 2: País -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">País</label>
                            <select class="w-full h-full min-h-[48px] bg-surface/50 border border-white/10 hover:border-highlight/50 text-slate-300 rounded-xl px-4 py-3 outline-none focus:border-highlight transition-colors cursor-pointer text-sm font-semibold">
                                <option value="" class="bg-surface">Todos os Países</option>
                                <option value="BR" class="bg-surface">Brasil</option>
                                <option value="US" class="bg-surface">Estados Unidos</option>
                                <option value="PT" class="bg-surface">Portugal</option>
                                <option value="GB" class="bg-surface">Reino Unido</option>
                                <option value="CA" class="bg-surface">Canadá</option>
                                <option value="AU" class="bg-surface">Austrália</option>
                                <option value="DE" class="bg-surface">Alemanha</option>
                                <option value="FR" class="bg-surface">França</option>
                                <option value="IT" class="bg-surface">Itália</option>
                                <option value="ES" class="bg-surface">Espanha</option>
                                <option value="JP" class="bg-surface">Japão</option>
                            </select>
                        </div>

                        <!-- Coluna 1: Status -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Status</label>
                            <select class="w-full h-full min-h-[48px] bg-surface/50 border border-white/10 hover:border-highlight/50 text-slate-300 rounded-xl px-4 py-3 outline-none focus:border-highlight transition-colors cursor-pointer text-sm font-semibold">
                                <option value="all" class="bg-surface">Todos os Status</option>
                                <option value="live" class="bg-surface">Ao Vivo</option>
                                <option value="upcoming" class="bg-surface">Agendado</option>
                                <option value="completed" class="bg-surface">Finalizado</option>
                            </select>
                        </div>

                        <!-- Coluna 2: Tamanho Canal -->
                        <div class="flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Inscritos</label>
                            <select class="w-full h-full min-h-[48px] bg-surface/50 border border-white/10 hover:border-highlight/50 text-slate-300 rounded-xl px-4 py-3 outline-none focus:border-highlight transition-colors cursor-pointer text-sm font-semibold">
                                <option value="all" class="bg-surface">Todos os Tamanhos</option>
                                <option value="small" class="bg-surface">Até 10 mil Inscritos</option>
                                <option value="medium" class="bg-surface">De 10 mil a 100 mil Inscritos</option>
                                <option value="large" class="bg-surface">Mais de 100 mil Inscritos</option>
                            </select>
                        </div>

                        <!-- Intervalo de Datas -->
                        <div class="col-span-1 sm:col-span-2 flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Intervalo de Datas</label>
                            <div class="w-full min-h-[48px] flex items-center gap-2 bg-surface/50 border border-white/10 hover:border-highlight/50 rounded-xl px-4 transition-colors focus-within:border-highlight overflow-hidden">
                                <span class="text-slate-400 text-xs font-semibold whitespace-nowrap">De:</span>
                                <input type="date" class="bg-transparent text-slate-300 outline-none text-sm font-semibold cursor-pointer w-full">
                                <span class="text-slate-400 text-xs font-semibold whitespace-nowrap ml-1">Até:</span>
                                <input type="date" class="bg-transparent text-slate-300 outline-none text-sm font-semibold cursor-pointer w-full">
                            </div>
                        </div>

                        <!-- Outros Filtros -->
                        <div class="col-span-1 sm:col-span-2 flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Filtro de Canais</label>
                            <div id="channelContainer" class="w-full min-h-[48px] relative flex flex-wrap items-center gap-2 bg-surface/50 border border-white/10 hover:border-highlight/50 rounded-xl px-4 py-2 transition-colors focus-within:border-highlight cursor-text" onclick="document.getElementById('channelInput').focus()">
                                <input type="text" id="channelInput" class="flex-grow bg-transparent border-none outline-none text-slate-300 placeholder-slate-500 text-sm font-semibold min-w-[150px] py-1">
                            </div>
                        </div>

                        <div class="col-span-1 sm:col-span-2 flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Palavras-chave na Descrição</label>
                            <div id="descContainer" class="w-full min-h-[48px] relative flex flex-wrap items-center gap-2 bg-surface/50 border border-white/10 hover:border-highlight/50 rounded-xl px-4 py-2 transition-colors focus-within:border-highlight cursor-text" onclick="document.getElementById('descInput').focus()">
                                <input type="text" id="descInput" class="flex-grow bg-transparent border-none outline-none text-slate-300 placeholder-slate-500 text-sm font-semibold min-w-[150px] py-1">
                            </div>
                        </div>

                        <div class="col-span-1 sm:col-span-2 flex flex-col gap-1.5">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Palavras-chave Negativas</label>
                            <div id="negativeContainer" class="w-full min-h-[48px] relative flex flex-wrap items-center gap-2 bg-surface/50 border border-white/10 hover:border-highlight/50 rounded-xl px-4 py-2 transition-colors focus-within:border-highlight cursor-text" onclick="document.getElementById('negativeInput').focus()">
                                <input type="text" id="negativeInput" class="flex-grow bg-transparent border-none outline-none text-slate-300 placeholder-slate-500 text-sm font-semibold min-w-[150px] py-1">
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <!-- Área de Resultados (Inicia Oculta) -->
        <div class="w-full mt-16 mb-12 hidden max-w-6xl mx-auto" id="resultsContainer">
            <div class="flex items-center justify-between mb-6 px-2">
                <h2 class="text-2xl font-bold text-white flex items-center gap-2 drop-shadow-md">
                    Lançamentos Encontrados
                </h2>
            </div>

            <!-- Grid de Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="resultsGrid">
                <!-- Os cards serão injetados aqui via JS -->
            </div>

            <!-- Loading Indicator -->
            <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-20">
                <div class="w-12 h-12 border-4 border-white/10 border-t-highlight rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 font-bold">Buscando na API do YouTube...</p>
            </div>
        </div>
    </div>

    <script>
        // === LÓGICA DO ACORDEÃO E SCROLL ===
        const toggleFiltersBtn = document.getElementById('toggleFiltersBtn');
        const filtersWrapper = document.getElementById('filtersWrapper');
        const filtersArrow = document.getElementById('filtersArrow');
        const mainBody = document.getElementById('mainBody');
        const resultsContainer = document.getElementById('resultsContainer');
        
        let isFiltersOpen = false;

        function updateScrollState() {
            // Habilita scroll se filtros estiverem abertos OU resultados estiverem visíveis
            const isResultsVisible = !resultsContainer.classList.contains('hidden');
            
            if (isFiltersOpen || isResultsVisible) {
                mainBody.style.overflowY = 'auto';
                mainBody.classList.remove('justify-center');
                mainBody.classList.add('pt-32'); // Dá espaço para o header absoluto no topo
            } else {
                mainBody.style.overflowY = 'hidden';
                mainBody.classList.add('justify-center');
                mainBody.classList.remove('pt-32');
                window.scrollTo(0, 0);
            }
        }

        toggleFiltersBtn.addEventListener('click', () => {
            isFiltersOpen = !isFiltersOpen;
            if(isFiltersOpen) {
                filtersWrapper.classList.remove('max-h-0', 'opacity-0');
                filtersWrapper.classList.add('max-h-[2000px]', 'opacity-100');
                filtersArrow.classList.add('rotate-180');
            } else {
                filtersWrapper.classList.add('max-h-0', 'opacity-0');
                filtersWrapper.classList.remove('max-h-[2000px]', 'opacity-100');
                filtersArrow.classList.remove('rotate-180');
            }
            updateScrollState();
        });

        // === MÁQUINA DE ESCREVER ===
        function setupTypewriter(inputId, prefix, texts, isChipContainer = false) {
            let ptIndex = 0; 
            let charIndex = 0; 
            let isDeleting = false;
            let animationTimeout;
            const inputEl = document.getElementById(inputId);
            if (!inputEl) return;

            function shouldHidePlaceholder() {
                if (inputEl.value.length > 0) return true;
                if (isChipContainer) {
                    const container = inputEl.parentElement;
                    if (container.querySelectorAll('.chip').length > 0) return true;
                }
                return false;
            }

            function type() {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', '');
                    clearTimeout(animationTimeout);
                    return;
                }
                const currentText = texts[ptIndex];
                if (isDeleting) {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex - 1));
                    charIndex--;
                } else {
                    inputEl.setAttribute('placeholder', prefix + currentText.substring(0, charIndex + 1));
                    charIndex++;
                }
                let typeSpeed = isDeleting ? 30 : 60;
                if (!isDeleting && charIndex === currentText.length) {
                    typeSpeed = 2500;
                    isDeleting = true;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    ptIndex = (ptIndex + 1) % texts.length;
                    typeSpeed = 500; 
                }
                clearTimeout(animationTimeout);
                animationTimeout = setTimeout(type, typeSpeed);
            }
            inputEl.addEventListener('input', () => {
                if (shouldHidePlaceholder()) {
                    inputEl.setAttribute('placeholder', '');
                    clearTimeout(animationTimeout);
                } else {
                    charIndex = 0; isDeleting = false;
                    clearTimeout(animationTimeout); type();
                }
            });
            if (isChipContainer) {
                const observer = new MutationObserver(() => {
                    if (shouldHidePlaceholder()) {
                        inputEl.setAttribute('placeholder', '');
                        clearTimeout(animationTimeout);
                    } else if (inputEl.value.length === 0) {
                        charIndex = 0; isDeleting = false;
                        clearTimeout(animationTimeout); type();
                    }
                });
                observer.observe(inputEl.parentElement, { childList: true });
            }
            type();
        }

        setupTypewriter('urlInput', '', ["Digite sua palavra-chave...", "Ex: masterclass", "Ex: workshop"], true);
        setupTypewriter('channelInput', '', ["Ex: @inexploroficial"], true);
        setupTypewriter('descInput', '', ["Ex: Hotmart"], true);
        setupTypewriter('negativeInput', '', ["Ex: webinar"], true);

        // === CHIPS ===
        function setupChipSystem(inputId, containerId) {
            const input = document.getElementById(inputId);
            const container = document.getElementById(containerId);
            if (!input || !container) return;
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    let value = input.value.trim().replace(/,$/, ''); 
                    if (value) { createChip(value, container, input); input.value = ''; }
                } else if (e.key === 'Backspace' && input.value === '') {
                    const chips = container.querySelectorAll('.chip');
                    if (chips.length > 0) chips[chips.length - 1].remove();
                }
            });
            input.addEventListener('blur', function() {
                let value = input.value.trim().replace(/,$/, '');
                if (value) { createChip(value, container, input); input.value = ''; }
            });
        }
        function createChip(text, container, input) {
            const chip = document.createElement('span');
            chip.className = 'chip bg-highlight text-white px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm whitespace-nowrap';
            chip.innerHTML = `${text} <span class="material-symbols-rounded text-[14px] cursor-pointer hover:text-black transition-colors" onclick="this.parentElement.remove()">close</span>`;
            container.insertBefore(chip, input);
        }
        setupChipSystem('urlInput', 'mainInputContainer');
        setupChipSystem('channelInput', 'channelContainer');
        setupChipSystem('descInput', 'descContainer');
        setupChipSystem('negativeInput', 'negativeContainer');

        // === PARTICULAS ===
        try {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#dc2626" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.4 },
                    "size": { "value": 3, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#dc2626", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1 }
                },
                "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": true, "mode": "grab" } } },
                "retina_detect": true
            });
        } catch (e) {}

        // === BUSCA MOCK ===
        const searchBtn = document.getElementById('searchBtn');
        const resultsGrid = document.getElementById('resultsGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');

        searchBtn.addEventListener('click', () => {
            resultsContainer.classList.remove('hidden');
            resultsGrid.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            
            updateScrollState(); // Habilita o scroll pois resultados apareceram

            setTimeout(() => {
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                resultsGrid.innerHTML = `
                    <article class="video-card bg-[#0F172A] border border-white/10 rounded-[2rem] overflow-hidden flex flex-col relative z-10 shadow-xl">
                        <div class="relative aspect-video overflow-hidden">
                            <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
                            <div class="absolute top-4 left-4 bg-highlight/20 text-highlight border border-highlight backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 shadow-lg animate-pulse">
                                <span class="material-symbols-rounded text-[16px]">sensors</span> Ao Vivo
                            </div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow bg-gradient-to-b from-transparent to-[#080B14]">
                            <h3 class="text-lg font-bold leading-tight mb-3 text-white">AULA 01: O Segredo do Marketing Digital em 2026</h3>
                            <div class="flex items-center gap-2 text-slate-400 mb-4">
                                <span class="material-symbols-rounded text-[18px]">account_circle</span>
                                <span class="text-sm font-semibold">Especialista em Vendas</span>
                            </div>
                            <div class="mt-auto flex items-center justify-between border-t border-white/10 pt-4">
                                <div class="flex flex-col">
                                    <span class="text-xs text-slate-500 font-bold uppercase tracking-wider">Agora</span>
                                    <span class="text-sm text-slate-300 font-medium">1.2k assistindo</span>
                                </div>
