<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Sistema Inteligente - Inexplor</title>
    <meta name="description" content="Acesse as ferramentas exclusivas da Inexplor.">
    <meta name="robots" content="index, follow">

    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #0ea5e9;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Efeito de grade de fundo hacker/tech */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            opacity: 0.5;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), var(--glow);
            text-align: center;
            width: 90%;
            max-width: 650px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #f8fafc;
            line-height: 1.3;
        }

        h1 .highlight {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cards-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Estilo dos Cards Interativos */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(14, 165, 233, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(139, 92, 246, 0.2);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            transition: transform 0.3s ease;
        }

        .card:hover .icon-wrapper {
            transform: scale(1.1) rotate(-5deg);
        }

        .icon-wrapper i {
            font-size: 32px;
            color: white;
        }

        .card h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .card p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Responsividade Desktop */
        @media (min-width: 650px) {
            .cards-wrapper {
                grid-template-columns: 1fr 1fr;
            }
            .container {
                padding: 60px 50px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>O que você <span class="highlight">deseja acessar?</span></h1>
        
        <div class="cards-wrapper">
            <!-- Card 1: Espião de Transação -->
            <a href="https://inexplor.grupobhds.com/espiao-de-transacao" class="card">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <i class="material-icons-round">radar</i>
                    </div>
                    <h3>Espião de Transação</h3>
                    <p>Descubra os produtos dos seus concorrentes através do código de transação HP.</p>
                </div>
            </a>

            <!-- Card 2: Desbloquear Produto Oculto -->
            <a href="https://inexplor.grupobhds.com/desbloqueio-produto-oculto" class="card">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <i class="material-icons-round">lock_open</i>
                    </div>
                    <h3>Desbloqueio de Produto Oculto</h3>
                    <p>Desbloqueie produtos ocultos da Hotmart que estão escondidos no mercado.</p>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
